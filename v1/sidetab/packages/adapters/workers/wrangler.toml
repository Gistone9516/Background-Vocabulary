name = "sidetab-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"

# Workers Paid 플랜 필요(CPU 30초 기본, 5분 확장 가능, I/O 대기 무과금).
# 무료 플랜은 CPU 10ms로 LLM 프록시에 불충분하다(구현계획 2장 확인 완료).

[build]
command = ""

# [vars]에는 비밀이 아닌 공개 설정 값만 넣는다.
# 실제 API 키는 반드시 wrangler secret put 명령으로 Secrets로 등록한다.
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put TAVILY_API_KEY
# wrangler secret put UPSTASH_REDIS_REST_URL
# wrangler secret put UPSTASH_REDIS_REST_TOKEN
[vars]
# 비밀이 아닌 공개 설정이 필요할 때 여기에 추가한다.
# 운영 한도 튜닝 변수(전부 선택, 미설정이면 shared DEFAULT_LIMITS). 프로덕션은 여기 값으로 조정한다.
# 클라이언트 관련 값(NARROW_MAX_*, DETAIL_LIMIT_FREE, FREE_WEEKLY_LIMIT)은 /config로 확장에 자동 반영된다.
# TERM_COUNT_FREE = "4"
# TERM_COUNT_PAID = "8"
# MAXTOK_CLASSIFY = "900"
# MAXTOK_NEXT = "800"
# MAXTOK_SUMMARIZE = "1000"
# MAXTOK_RECOMMEND_FREE = "1400"
# MAXTOK_RECOMMEND_PAID = "2600"
# MAXTOK_DETAIL_FREE = "900"
# MAXTOK_DETAIL_PAID = "1300"
# FREE_WEEKLY_LIMIT = "7"
# GLOBAL_DAILY_CAP = "300"
# NARROW_MAX_FREE = "3"
# NARROW_MAX_PAID = "8"
# DETAIL_LIMIT_FREE = "3"
# 보안 하드닝(Phase 4): 입력 길이 상한 / IP당 분·일 요청 상한 / 확장 origin 잠금
# MAX_INPUT_CHARS = "4000"
# RATE_PER_MIN = "20"
# RATE_PER_DAY = "200"
# MAX_CONTEXT_CHARS = "12000"
# ALLOWED_EXT_ORIGIN = "chrome-extension://<배포된_확장_ID>"

# 결제 인증(Phase 0). PAYMENT_ENABLED 는 활성 값으로 둔다(b안: false 면 결제는 준비 중 스텁, 티어 게이팅은 평소대로).
PAYMENT_ENABLED = "false"
# JWT_KID = "k1"
# GOOGLE_CLIENT_ID = "<구글 OAuth 웹 클라이언트 ID>"
# GOOGLE_REDIRECT_URI = "https://<배포된_확장_ID>.chromiumapp.org/"
# 개발 중 pro 테스트(프로덕션에서는 둘 다 비활성):
# DEV_MODE = "true"
# DEV_FORCE_TIER = "paid"

# 로컬 개발(.dev.vars 파일 참조):
# .dev.vars 파일에 키를 넣으면 wrangler dev 실행 시 자동으로 env에 주입된다.
# .dev.vars는 git에 커밋하지 않는다(.gitignore 필수).

# 결제 인증 시크릿(Phase 0). 반드시 wrangler secret 으로 등록한다(코드·toml 에 평문 금지).
# wrangler secret put JWT_SECRET_CURRENT     # openssl rand -base64 48 등으로 생성한 임의 문자열
# wrangler secret put JWT_SECRET_PREV         # 키 로테이션 시에만(평소 미설정)
# wrangler secret put GOOGLE_CLIENT_SECRET    # 구글 OAuth 웹 클라이언트 시크릿

# 엔타이틀먼트 저장소(Cloudflare D1). 사용 전 프로비저닝이 필요하다.
#   wrangler d1 create sidetab-entitlements        그러면 출력된 database_id 를 아래 database_id 에 채운다.
#   wrangler d1 migrations apply sidetab-entitlements        migrations/0001_init.sql 적용.
# database_id 를 채우기 전에는 인증 라우트가 503 이고 기존 추천 흐름은 정상 동작한다.
[[d1_databases]]
binding = "DB"
database_name = "sidetab-entitlements"
database_id = "<wrangler d1 create 후 채움>"
migrations_dir = "migrations"
