# 로컬 통합 테스트용 Postgres(§0-2 local 계층). Aurora와 같은 마이그레이션 SQL을 사용한다.
# 기동: docker compose up -d  /  DATABASE_URL=postgres://vock:vock@localhost:5433/vock
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vock
      POSTGRES_PASSWORD: vock
      POSTGRES_DB: vock
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vock -d vock"]
      interval: 2s
      timeout: 3s
      retries: 30
